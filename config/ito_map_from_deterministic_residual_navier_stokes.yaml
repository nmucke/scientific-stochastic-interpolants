experiment_tracking:
  project: stochastic_navier_stokes

len_field_history: 5

preprocesser:
  _target_: scisi.preprocessing.preprocessor.Preprocesser
  base:
    mean:
      - 0.0
    std:
      - 3.09969
  target:
    mean:
      - 0.0
    std:
      - 3.09969

# Data
train_data:
  # Dataloader
  _target_: torch.utils.data.DataLoader
  batch_size: 32
  shuffle: True
  # Dataset
  dataset:
    _target_: scisi.data.datasets.StochasticNavierStokesDataset
    paths:
      - data/stochastic_navier_stokes
    files:
      - data.npz
    len_field_history: ${len_field_history}
    tajectories_ids: (0, 160)

val_data:
  _target_: torch.utils.data.DataLoader
  batch_size: 32
  shuffle: False
  dataset:
    _target_: scisi.data.datasets.StochasticNavierStokesDataset
    paths:
      - data/stochastic_navier_stokes
    files:
      - data.npz
    len_field_history: ${len_field_history}
    tajectories_ids: (160, 180)


test_data:
  _target_: scisi.data.datasets.StochasticNavierStokesDataset
  paths:
    - data/stochastic_navier_stokes
  files:
    - data.npz
  len_field_history: ${len_field_history}
  tajectories_ids: (180, 200)
  train_or_test: test

# Method 1 (mean-anchored residual Ito map): freeze a trained deterministic
# model F and train a new (typically smaller) Ito map on the normalized
# residual (X1 - F(x_n)) / rho only. Stage-0 residual calibration runs
# automatically on the validation data (or loads residual_stats.pt persisted
# next to the deterministic checkpoint).
pre_trained_model:
  project: deterministic_navier_stokes
  name: null # <- fill in the deterministic (PR 2) run name
  type: deterministic
  init_mode: residual # residual (Method 1) | warm_start (Method 2)
  analytic_teacher: false # Gaussian-shell warm-up teacher (Method 3);
  # combine with trainer.teacher_warmup_epochs > 0

# The model block is the INNER residual Ito map; main_train wraps it into a
# ResidualItoMapModel around the frozen mean model. The residual field is
# lower-amplitude and higher-frequency than the state, so a smaller backbone
# than F's usually suffices (CorrDiff / Finn et al.).
model:
  _target_: scisi.models.ito_maps.ito_map_model.ItoMapModel
  interpolation:
    _target_: scisi.models.interpolations.QuadraticStochasticInterpolation
    gamma_multiplier: 1.0
    wiener_process: true
  sigma_schedule: gamma_matched # gamma_matched | paper | zero. Keep gamma_matched for
  # stochastic interpolations: 'paper' makes the small-t score correction in the
  # diagonal target grow like 1/sqrt(t), giving heavy-tailed regression targets.
  brownian_encoder:
    _target_: scisi.models.ito_maps.brownian.KLEncoder
    num_coeffs: 5 # feature channels per state channel
  num_grid_points: 64 # Brownian grid resolution (path mode)
  brownian_mode: kl # kl (closed form, memory-light) | path
  num_kl_terms: 16 # KL terms held by the sampler in kl mode
  drift_model:
    _target_: scisi.architectures.u_net.UNet
    in_channels: 1 # number of channels in the input
    out_channels: 1 # number of channels in the output
    hidden_channels: [8, 16, 32] # smaller than F's backbone: residual corrector
    cond_dim: 2 # two-time conditioning (s, t)
    two_time_cond: true # embed (s, t) with the two-time encoder
    cond_embedding_dim: 128 # dimension of the scalar conditional embedding
    len_field_history: ${len_field_history} # number of field history steps
    field_cond_channels: null # number of channels in the field conditional input
    brownian_feature_channels: 5 # Brownian features (num_coeffs * in_channels), injected
    # via a zero-init projection so the init conv stays teacher-compatible
    pars_cond_dim: null # dimension of the pars conditional input, E.g. Reynolds number, viscosity, etc.
    pars_cond_embedding_dim: null # dimension of the pars conditional embedding
    multiplier: 2 # multiplier for the number of channels in the hidden layers in the conv next blocks
    num_blocks: 2 # number of convnext blocks per layer
    dropout_rate: 0.1 # dropout rate
    padding: torch.nn.CircularPad2d # padding module
    attention_in_layers: [false, false, true] # whether to use attention in the layers. Last layer is the bottleneck layer.
    attention: # attention module and its arguments
      target: scisi.architectures.attention.SpatialAttention # attention module
      pos_embedding_type: rotary # positional embedding type
      heads: 4 # number of heads
      patch_size: 1 # patch size
      dropout_rate: 0.1 # dropout rate
      embedding_dim: 256 # embedding dimension

optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  weight_decay: 0.000001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 1000
  eta_min: 0.00001

loss_fn:
  _target_: torch.nn.MSELoss

trainer:
  _target_: scisi.training.ito_map_trainer.ItoMapTrainer
  num_epochs: 1000
  device: cuda
  early_stopping:
    _target_: scisi.training.trainer.EarlyStopping
    patience: 50
  gradient_clipper:
    _target_: scisi.training.gradient_clipping.EmaGradientClipper
    ema_coef1: 0.9
    ema_coef2: 0.99
    max_norm_ratio: 2.0
    clip_norm_ratio: 1.1
  mixed_precision_warmup: 200
  ema_decay: 0.999 # EMA weights stabilize the self-distillation target
  consistency_mode: lsd # lsd (Lagrangian, jvp) | psd (semigroup composition)
  consistency_weight: 1.0
  off_diagonal_distribution: logit_normal # logit_normal | uniform
  derivative_mode: jvp # jvp | finite_difference (for non-traceable nets)
  couple_noise_to_path: true
  val_seed: 42 # fixed val-loop sampling so val losses are comparable across epochs
  freeze: null # list of dotted submodule names to freeze (staged fine-tuning)
  unfreeze_at_epoch: null # epoch at which frozen modules are unfrozen again
  teacher_warmup_epochs: 0 # with analytic_teacher: switch to data targets after N epochs
