  base: data/knmi/mean_field.npz
  target: data/knmi/mean_field.npz
  field_cond: data/knmi/mean_field.npz

# Data
train_data:
  # Dataloader
  _target_: torch.utils.data.DataLoader
  batch_size: 32
  shuffle: True
  num_workers: 2
  # Dataset
  dataset:
    _target_: scisi.data.datasets.KNMIDataset
    paths:
      # - /export/scratch2/ntm/SciGenML/data/knmi/
      - data/knmi/
    files:
      - sim_1.npz
      - sim_2.npz
      # - sim_3.npz
      # - sim_4.npz
      # - sim_5.npz
    len_field_history: 5
    save_in_memory: False
    # cache_dir: /export/scratch1/ntm/postdoc/scientific-stochastic-interpolants/cache/knmi/train
    cache_dir: /Users/ntmucke/Code/scientific-stochastic-interpolants/cache/knmi/train
    use_exisiting_cache: True
    starting_time: null
    ending_time: null

val_data:
  _target_: torch.utils.data.DataLoader
  batch_size: 32
  shuffle: False
  num_workers: 2
  dataset:
    _target_: scisi.data.datasets.KNMIDataset
    paths:
      # - /export/scratch2/ntm/SciGenML/data/knmi/
      - data/knmi/
    files:
      - sim_2.npz
      # - sim_9.npz
    len_field_history: 5
    save_in_memory: False
    # cache_dir: /export/scratch1/ntm/postdoc/scientific-stochastic-interpolants/cache/knmi/val
    cache_dir: /Users/ntmucke/Code/scientific-stochastic-interpolants/cache/knmi/val
    use_exisiting_cache: True
    starting_time: null
    ending_time: null

test_data:
  _target_: scisi.data.datasets.KNMIDataset
  paths:
    # - /export/scratch2/ntm/SciGenML/data/knmi/
    - data/knmi/
  files:
    - sim_2.npz
    # - sim_11.npz
    # - sim_12.npz
  len_field_history: 5
  train_or_test: test
  save_in_memory: True
  starting_time: null
  ending_time: null

model:
  _target_: scisi.models.follmer_stochastic_interpolant.FollmerStochasticInterpolant
  interpolation:
    _target_: scisi.models.interpolations.QuadraticStochasticInterpolation
    gamma_multiplier: 0.1
    wiener_process: true
  drift_model:
    _target_: scisi.architectures.u_net.UNet
    in_channels: 1 # number of channels in the input
    out_channels: 1 # number of channels in the output
    hidden_channels: [32, 64, 128, 256] # number of channels in the hidden layers
    cond_dim: 1 # dimension of the scalar conditional input, this is typically pseudo time
    cond_embedding_dim: 256 # dimension of the scalar conditional embedding
    len_field_history: 5 # number of field history steps
    field_cond_channels: 1 # number of channels in the field conditional input
    pars_cond_dim: 1 # dimension of the pars conditional input, E.g. Reynolds number, viscosity, etc.
    pars_cond_embedding_dim: 256 # dimension of the pars conditional embedding
    multiplier: 2 # multiplier for the number of channels in the hidden layers in the conv next blocks
    num_blocks: 2 # number of convnext blocks per layer
    dropout_rate: 0.1 # dropout rate
    padding: torch.nn.CircularPad2d
    attention_in_layers: [false, false, false, true] # whether to use attention in the layers. Last layer is the bottleneck layer.
    attention: # attention module and its arguments
      target: scisi.architectures.attention.SpatialAttention # attention module
      pos_embedding_type: rotary # positional embedding type
      heads: 4 # number of heads
      patch_size: 2 # patch size
      dropout_rate: 0.1 # dropout rate
      # embedding_dim: 128 # embedding dimension
      # mlp_dim: 1024 # mlp dimension

optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  weight_decay: 0.00001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 100
  eta_min: 0.000001


loss_fn:
  _target_: scisi.training.loss_functions.LatitudeWeightedMSELoss

trainer:
  _target_: scisi.training.trainer.Trainer
  num_epochs: 1000
  device: cuda
  early_stopping:
    _target_: scisi.training.trainer.EarlyStopping
    patience: 25
  gradient_clipper:
    _target_: scisi.training.gradient_clipping.EmaGradientClipper
    ema_coef1: 0.9
    ema_coef2: 0.99
    max_norm_ratio: 2.0
    clip_norm_ratio: 1.1
  mixed_precision_warmup: 50
