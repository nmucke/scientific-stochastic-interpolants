# Data
train_data:
  # Dataloader
  _target_: torch.utils.data.DataLoader
  batch_size: 16
  shuffle: True
  # Dataset
  dataset:
    _target_: scisi.data.datasets.UDalesDataset
    paths:
      - data/udales
    files: (0, 40)
    len_field_history: ${len_field_history}
    starting_time: 50
    ending_time: 250
    skip_steps: 1
    save_in_memory: False
    cache_dir: /export/scratch1/ntm/postdoc/scientific-stochastic-interpolants/cache/udales/train
    # cache_dir: /Users/ntmucke/Code/scientific-stochastic-interpolants/cache/udales/train
    use_exisiting_cache: False

val_data:
  _target_: torch.utils.data.DataLoader
  batch_size: 16
  shuffle: False
  dataset:
    _target_: scisi.data.datasets.UDalesDataset
    paths:
      - data/udales
    files: (40, 45)
    len_field_history: ${len_field_history}
    starting_time: 50
    ending_time: 250
    skip_steps: 1
    save_in_memory: False
    cache_dir: /export/scratch1/ntm/postdoc/scientific-stochastic-interpolants/cache/udales/val
    # cache_dir: /Users/ntmucke/Code/scientific-stochastic-interpolants/cache/udales/val
    use_exisiting_cache: False


test_data:
  _target_: scisi.data.datasets.UDalesDataset
  paths:
    - data/udales
  files: (46, 47)
  len_field_history: ${len_field_history}
  starting_time: 50
  ending_time: 250
  skip_steps: 1
  save_in_memory: True
  use_exisiting_cache: False
  train_or_test: test

model:
  _target_: scisi.models.follmer_stochastic_interpolant.FollmerStochasticInterpolant
  interpolation:
    _target_: scisi.models.interpolations.QuadraticStochasticInterpolation
    gamma_multiplier: 0.1
    wiener_process: true
  drift_model:
    _target_: scisi.architectures.pde_transformer.PDETransformerWrapper
    in_channels: 4 # number of channels in the input
    out_channels: 4 # number of channels in the output
    len_field_history: ${len_field_history} # number of field history steps
    type: PDE-B # type of the PDE transformer. S for small, B for medium, L for large
    patch_size: 4 # patch size
    periodic: true # whether to use periodic padding
    carrier_token_active: false # whether to use carrier tokens
    field_cond_channels: 1 # number of channels in the field conditional input


optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  weight_decay: 0.000001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 1000
  eta_min: 0.00001
  # _target_: torch.optim.lr_scheduler.CosineAnnealingWarmRestarts
  # T_0: 25
  # T_mult: 1
  # eta_min: 0.00001

loss_fn:
  _target_: torch.nn.MSELoss

trainer:
  _target_: scisi.training.trainer.Trainer
  num_epochs: 1000
  device: cuda
  early_stopping:
    _target_: scisi.training.trainer.EarlyStopping
    patience: 50
  gradient_clipper:
    _target_: scisi.training.gradient_clipping.EmaGradientClipper
    ema_coef1: 0.9
    ema_coef2: 0.99
    max_norm_ratio: 2.0
    clip_norm_ratio: 1.1
  mixed_precision_warmup: 200
