  project: knmi

preprocesser:
  _target_: scisi.preprocessing.preprocessor.Preprocesser
  base:
    mean:
      - 21.073786
    std:
      - 41.259544
  target:
    mean:
      - 21.073786
    std:
      - 41.259544

# Data
train_data:
  # Dataloader
  _target_: torch.utils.data.DataLoader
  batch_size: 32
  shuffle: True
  num_workers: 4
  # Dataset
  dataset:
    _target_: scisi.data.datasets.WeatherDataset
    paths:
      - /export/scratch2/ntm/SciGenML/data/weather_npz/
    files:
      - "2017/random_0901_1231.npz"
      - "2017/random_0501_0831.npz"
      # - "2017/storm_0701_1231.npz"
      # - "2017/storm_0101_0630.npz"
      # - "2018/random_0901_1231.npz"
      # - "2018/random_0501_0831.npz"
      # - "2018/random_0101_0430.npz"
      # - "2018/storm_0701_1231.npz"
      # - "2018/storm_0101_0630.npz"
      # - "2019/random_0901_1231.npz"
      # - "2019/random_0501_0831.npz"
      # - "2019/random_0101_0430.npz"
      # - "2019/storm_0701_1231.npz"
      # - "2019/storm_0101_0630.npz"
    len_field_history: 5
    save_in_memory: False
    cache_dir: /export/scratch1/ntm/postdoc/scientific-stochastic-interpolants/cache/weather/train
    use_exisiting_cache: False
    starting_time: null
    ending_time: null

val_data:
  _target_: torch.utils.data.DataLoader
  batch_size: 32
  shuffle: False
  num_workers: 4
  dataset:
    _target_: scisi.data.datasets.WeatherDataset
    paths:
      - /export/scratch2/ntm/SciGenML/data/weather_npz/
    files:
      - "2017/random_0501_0831.npz"
    len_field_history: 5
    save_in_memory: False
    cache_dir: /export/scratch1/ntm/postdoc/scientific-stochastic-interpolants/cache/weather/val
    use_exisiting_cache: False
    starting_time: null
    ending_time: null

test_data:
  _target_: scisi.data.datasets.WeatherDataset
  paths:
    - /export/scratch2/ntm/SciGenML/data/weather_npz/
  files:
      - "2017/random_0501_0831.npz"
  len_field_history: 5
  train_or_test: test
  save_in_memory: True
  starting_time: null
  ending_time: null

model:
  _target_: scisi.models.follmer_stochastic_interpolant.FollmerStochasticInterpolant
  interpolation:
    _target_: scisi.models.interpolations.QuadraticStochasticInterpolation
    gamma_multiplier: 0.1
    wiener_process: true
  drift_model:
    _target_: scisi.architectures.u_net.UNet
    in_channels: 1 # number of channels in the input
    out_channels: 1 # number of channels in the output
    hidden_channels: [32, 64, 128, 256] # number of channels in the hidden layers
    cond_dim: 1 # dimension of the scalar conditional input, this is typically pseudo time
    cond_embedding_dim: 256 # dimension of the scalar conditional embedding
    len_field_history: 5 # number of field history steps
    field_cond_channels: null # number of channels in the field conditional input
    pars_cond_dim: null # dimension of the pars conditional input, E.g. Reynolds number, viscosity, etc.
    pars_cond_embedding_dim: null # dimension of the pars conditional embedding
    multiplier: 2 # multiplier for the number of channels in the hidden layers in the conv next blocks
    num_blocks: 2 # number of convnext blocks per layer
    dropout_rate: 0.1 # dropout rate
    padding: torch.nn.CircularPad2d
    attention_in_layers: [false, false, false, true] # whether to use attention in the layers. Last layer is the bottleneck layer.
    attention: # attention module and its arguments
      target: scisi.architectures.attention.SpatialAttention # attention module
      pos_embedding_type: rotary # positional embedding type
      heads: 4 # number of heads
      patch_size: 2 # patch size
      dropout_rate: 0.1 # dropout rate
      # embedding_dim: 128 # embedding dimension
      # mlp_dim: 1024 # mlp dimension

optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  weight_decay: 0.00001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 100
  eta_min: 0.000001

trainer:
  _target_: scisi.training.trainer.Trainer
  num_epochs: 1000
  loss_fn:
    _target_: torch.nn.MSELoss
  device: cuda
  early_stopping:
    _target_: scisi.training.trainer.EarlyStopping
    patience: 25
  max_grad_norm: 5.0
  mixed_precision_warmup: 50
