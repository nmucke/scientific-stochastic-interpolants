pre_trained_model:
  project: stochastic_navier_stokes
  name: flow_matching

obs_operator:
  _target_: scisi.likelihood_models.observation_operators.LinearObservationOperator
  # type: random
  # percent_obs: 0.05
  type: grid
  skip_grid: 8

likelihood_model:
