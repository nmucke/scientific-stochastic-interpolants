defaults:
  - case: navier_stokes
  - method: si_sde
  - scenario: superres_32
  - _self_

# Where tidy results land. Aggregated mean +/- std over seeds is written here,
# then make_tables.py turns it into the LaTeX snippets under generated/.
results_root: paper_experiments/results
results_file: ${results_root}/${case.name}_results.csv

# Fixed seed list (mirrors common.seeding.SEED_LIST). Mean +/- std over these is
# reported in every table (reproducibility Section 9).
seeds: [0, 1, 2, 3, 4]

# Shared sampler settings (spec Section 1.3). Sweep E / M in the ablation.
ensemble_size: 64   # E
num_steps: 50       # M

# Likelihood mode override (top-level so `likelihood_mode=...` works on the CLI,
# e.g. in run_gpu_ns.sh). null -> use each method config's own default
# (`method.likelihood_model.likelihood_mode`, normally `inflated`). Set to
# inflated | inflated_shared | dps_jacobian_free to force one mode across all methods.
likelihood_mode: null

# Shared-Jacobian refresh cadence (Ours + inflated_shared only; top-level so
# `jacobian_refresh_every=k` works on the CLI). null -> the method config's
# `likelihood_model.jacobian_refresh_every` (default 1 = recompute every
# pseudo-step, exact). k > 1 reuses the cached H J H^T for k - 1 steps.
jacobian_refresh_every: null

# Override at the CLI, e.g.:
#   python paper_experiments/run.py case=navier_stokes method=dm_sde scenario=sparse_5
#   python paper_experiments/run.py --multirun method=si_sde,dm_sde,fm_ode
