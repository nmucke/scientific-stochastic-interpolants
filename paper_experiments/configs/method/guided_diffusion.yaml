# Guided diffusion / DPS baseline (chung_diffusion_2023): reverse-SDE with the DPS
# likelihood N(y; H E[x0|x_t], R) and gradient through the denoiser. Use a
# diffusion prior of matched capacity, or reuse our score with a VP/VE schedule
# (state which in the paper). GAP E5: implement as method + posterior/likelihood.
name: Guided diffusion
stepper: sde
diffusion_term: null

likelihood_model:
  # TODO(E5): DPS likelihood (raw R surrogate) — NOT implemented yet (symbol does
  # not exist). Optionally the PiGDM-style inflated covariance R + H Cov(x1|x_tau) H^T
  # is available for free (ablation, Section 7).
  _target_: scisi.likelihood_models.guidance.DPSGaussianLikelihood

posterior_model:
  _target_: scisi.posterior_models.diffusion_posterior.DiffusionPosterior
