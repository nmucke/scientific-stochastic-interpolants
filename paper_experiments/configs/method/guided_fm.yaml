# Guided FM / FIG baseline (yan_fig_2024): guided probability-flow ODE with the
# measurement interpolant; velocity correction scaled by the path's velocity-score
# coefficient. Shares the trained prior. (GAP: label this as the FIG baseline, not
# our method -- the legacy GuidanceGaussianLikelihood is retired to baseline status.)
name: Guided FM
stepper: ode
diffusion_term: null

likelihood_model:
  _target_: scisi.likelihood_models.guidance.GuidanceGaussianLikelihood

posterior_model:
  _target_: scisi.posterior_models.flow_matching_posterior.FlowMatchingPosterior
