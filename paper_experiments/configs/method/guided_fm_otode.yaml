# OT-ODE baseline (pokle_training-free_2024): "Training-free Linear Image
# Inverses via Flows" (Pokle, Muckley, Chen & Karrer, TMLR 2024,
# https://arxiv.org/abs/2310.04432). The Conditional OT-ODE variant: covariance-
# preconditioned guidance g = (d xhat_1/d z_t)^T H^T (r_t^2 H H^T + sigma_y^2 I)^{-1}
# (y - H xhat_1) with the posterior-variance estimate r_t^2 = (1-t)^2/((1-t)^2+t^2)
# (paper Eq. 16) and one-step denoiser xhat_1 = x + (1-t) v (paper Eq. 10), all
# mapped from Pokle's reverse pseudo-time to our forward t via t_ours = 1 - tau.
# Implemented as the GuidanceGaussianLikelihood weighting='ot_ode' mode (the
# default weighting='simple' is the legacy one-step DPS-on-flow baseline). Shares
# the trained FM prior; routed through FlowMatchingPosterior with stepper=ode (g=0).
#
# Distinct from ``guided_fm`` (legacy one-step DPS guidance) and ``guided_fm_fig``
# (FIG measurement interpolant).
name: Guided FM (OT-ODE)
stepper: ode
diffusion_term: null

likelihood_model:
  _target_: scisi.likelihood_models.guidance.GuidanceGaussianLikelihood
  weighting: ot_ode
  # Pokle's measurement noise sigma_y^2 used inside the preconditioner
  # (r_t^2 H H^T + sigma_y^2 I)^{-1} (paper Alg. 1 line 7). null -> use the
  # experiment's measurement variance R. Pokle uses sigma_y in {0, 0.05} for
  # non-denoising tasks; the r_t^2 H H^T term keeps the solve regular at 0.
  # LOCKED: sigma_y^2 = 0 (sweep: sigma_y^2=0 ~ sigma_y^2=R, 0 marginally better).
  obs_variance: 0.0
  # Pokle's adaptive weight gamma_t (paper Alg. 1, "Adaptive weight").
  # LOCKED: gamma_t = 4.0 -- the KL elbow on the traj1/sparse-5% sweep (vs the
  # E=1000 EnKF posterior): KL 2.24->1.82->1.78 for gamma 2->4->8 (plateaued by 4),
  # while RMSE keeps dropping into a spread-collapse regime past gamma=4. gamma=4
  # keeps the distributional optimum (KL 1.82, RMSE 0.139) and transfers better
  # across trajectories/scenarios than the RMSE-only winner gamma=8.
  guidance_scale: 4.0

posterior_model:
  _target_: scisi.posterior_models.flow_matching_posterior.FlowMatchingPosterior
